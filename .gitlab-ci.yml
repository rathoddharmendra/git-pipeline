stages:
  - .pre
  - build
  - test
  - deploy
  - .post

pre-tasks:
  stage: .pre
  script:
    - echo "This job tests something, but takes more time than test-job1."
    - echo "After the echo commands complete, it runs the sleep command for 20 seconds"
    - echo "which simulates a test that runs 20 seconds longer than test-job1"    
    - sleep 20
  when: manual

build_artifact:
  stage: build
  script:
    - mkdir build && cd build && echo "$(uname) - $(whoami)" >>  artifact.txt && cat /etc/os-release* >> artifact.txt; cat artifact.txt
    - echo "Artifact created successfully"
    - echo "Uploading artifact to docker registry..."
    - echo "Successfully created artifact and uploaded to docker registry"
  artifacts:
    paths:
      - build/artifact.txt
    expire_in: 1 hour
  when: manual